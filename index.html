<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Software Development – Kevin Karanja</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Main CSS (same file used by index.html) -->
    <link rel="stylesheet" href="style.css" />

    <style>
        /* Additional styles for the dev page */
        .dev-intro {
            text-align: center;
            margin-bottom: 3rem;
        }

        .dev-intro p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 650px;
            margin: 0 auto;
        }

        .repo-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .repo-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.8rem;
            border: 1px solid var(--border-color);
            transition: transform var(--transition), border-color var(--transition);
            display: flex;
            flex-direction: column;
        }

        .repo-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .repo-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #fff;
            word-break: break-word;
        }

        .repo-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1rem;
            flex: 1;
        }

        .repo-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .repo-meta i {
            margin-right: 0.3rem;
        }

        .repo-language {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: rgba(255,255,255,0.06);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
        }

        .repo-stars i {
            color: #f0c040;
        }

        .repo-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: 600;
            color: var(--accent);
            margin-top: 0.5rem;
            transition: color 0.2s;
        }

        .repo-link:hover {
            color: var(--accent-hover);
        }

        .loading-spinner {
            text-align: center;
            padding: 4rem 0;
            color: var(--text-secondary);
        }

        .error-message {
            text-align: center;
            padding: 4rem 0;
            color: #f87171;
        }

        @media (max-width: 768px) {
            .repo-card {
                padding: 1.3rem;
            }
            .repo-name {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Sticky Header (same as main site) -->
    <header class="site-header" id="header">
        <div class="container header-inner">
            <a href="https://kabrownie.github.io/index.html" class="logo">Kevin Karanja</a>
            <nav class="nav-links">
                <a href="https://kabrownie.github.io/index.html">Home</a>
                <a href="https://kabrownie.github.io/index.html#about">About</a>
                <a href="https://kabrownie.github.io/index.html#skills">Skills</a>
                <a href="https://kabrownie.github.io/index.html#contact">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="section" style="padding-top: 120px;">
        <div class="container">
            <div class="dev-intro">
                <h1 class="section-title">Software Development Projects</h1>
                <p>Here are my public repositories — side projects, apps, and experiments built with Java, Kotlin, Flutter, Python, Laravel, and more.</p>
            </div>

            <!-- Dynamic content will be injected here -->
            <div id="repo-container" class="repo-grid">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-pulse"></i> Loading repositories from GitHub...
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <p>© 2026 Kevin Karanja — Built with focus.</p>
    </footer>

    <!-- Scroll‑to‑top Button -->
    <a href="#" class="scroll-to-top" id="scrollBtn"><i class="fas fa-chevron-up"></i></a>

    <!-- Scripts -->
    <script src="js/main.js"></script>
   >
<script>
    // Fetch GitHub repos for user 'kabrownie'
    const username = 'kabrownie';
    const container = document.getElementById('repo-container');

    async function fetchRepos() {
        try {
            const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&direction=desc&per_page=30`);
            if (!response.ok) throw new Error('Network response was not ok');
            const repos = await response.json();

            // Filter out forks and archived repos if desired
            const filtered = repos.filter(repo => !repo.fork && !repo.archived);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="error-message">No public repositories found.</div>';
                return;
            }

            container.innerHTML = ''; // clear spinner

            filtered.forEach(repo => {
                const card = document.createElement('div');
                card.className = 'repo-card';

                const lang = repo.language ? repo.language : 'N/A';
                const stars = repo.stargazers_count;

                card.innerHTML = `
                    <div class="repo-name">
                        <a href="${repo.html_url}" target="_blank" rel="noopener">${repo.name}</a>
                    </div>
                    <div class="repo-desc">${repo.description || 'No description provided.'}</div>
                    <div class="repo-meta">
                        <span class="repo-language">
                            <i class="fas fa-circle" style="font-size: 0.6rem; color: #8a9cf0;"></i> ${lang}
                        </span>
                        <span class="repo-stars"><i class="fas fa-star"></i> ${stars}</span>
                        <span><i class="fas fa-code-branch"></i> ${repo.default_branch}</span>
                    </div>
                    <a href="${repo.html_url}" target="_blank" rel="noopener" class="repo-link">
                        View on GitHub <i class="fas fa-external-link-alt"></i>
                    </a>
                `;
                container.appendChild(card);
            });
        } catch (error) {
            console.error('Error fetching repos:', error);
            container.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle"></i> Unable to load repositories. Please check back later.
                </div>`;
        }
    }

    fetchRepos();
</script>
</body>
</html>
